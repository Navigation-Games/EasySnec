name: Build binaries

on:
  push:
    tags: ["v*"] # tagged pushes also publish a GitHub Release
  workflow_dispatch: {} # plus a manual "Run workflow" button

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: bash scripts/build_nuitka.sh
            artifact: easysnec-macos-arm64
            path: dist/easysnec
          - os: ubuntu-latest
            script: bash scripts/build_nuitka.sh
            artifact: easysnec-linux-x64
            path: dist/easysnec
          - os: windows-latest
            script: pwsh scripts/build_nuitka.ps1
            artifact: easysnec-windows-x64
            path: dist/easysnec.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install dependencies
        run: uv sync --frozen

      # The --onefile argument on Linux needs patchelf
      - name: Install patchelf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Build with Nuitka
        run: ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { path: artifacts }

      - name: Create / update release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/**/*
